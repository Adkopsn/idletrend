name: Update IdleTrend Market Data

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-market:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NODE_ENV: production

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Create snapshot directory
        run: mkdir -p poc/snapshots

      - name: Fetch and import market data
        run: node poc/run-analysis.mjs